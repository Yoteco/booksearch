<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Search</title>

<style>
body{
    margin:0;
    background:#244724;
    color:#F25E9D;
    font-family:Papyrus, fantasy;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

#container{
    width:50vw;
    text-align:center;
}

h1{
    font-size:3vw;
    margin-bottom:2vw;
}

input{
    width:100%;
    font-size:2vw;
    padding:1vw;
    border:2px solid #F25E9D;
    border-radius:12px;
    box-sizing:border-box;
    background:white;
    color:#F25E9D;
    font-family:inherit;
    text-align:center;
}

input::placeholder{
    color:#F25E9D;
    opacity:0.6;
}

button{
    margin-top:2vw;
    width:50%;
    font-size:2vw;
    padding:1vw;
    border:none;
    border-radius:12px;
    cursor:pointer;
    background:#9679B3;
    color:white;
    font-family:inherit;
    transition:0.2s;
}

button:hover{
    filter:brightness(110%);
}

button:active{
    transform:scale(0.98);
}
</style>

</head>
<body>

<div id="container">

    <h1>Book Search</h1>

    <input
        id="book"
        type="text"
        placeholder="Enter a book title..."
        autofocus>

    <button onclick="searchBook()">Search</button>

</div>

<script>
function searchBook(){

    const title = document.getElementById("book").value.trim();

    if(title === "")
        return;

    const q = encodeURIComponent(title);

    // Goodreads
    window.open(
        "https://www.goodreads.com/search?q=" + q,
        "_blank"
    );

    // Mobilism
    window.open(
        "https://forum.mobilism.me/search.php?keywords=" + q +
        "&sr=topics&sf=titleonly",
        "_blank"
    );

    // Anna's Archive
    window.open(
        "https://annas-archive.gl/search?index=&page=1&sort=&ext=epub&display=&q=" + q,
        "_blank"
    );
}

document.getElementById("book").addEventListener("keydown", function(e){
    if(e.key === "Enter")
        searchBook();
});
</script>

</body>
</html>
