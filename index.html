<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BookSearch</title>

<style>
body{
    margin:0;
    background:#244724;
    color:#F25E9D;
    font-family:Papyrus, fantasy;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

#container{
    width:50vw;
    text-align:center;
}

h1{
    font-size:3vw;
    margin-bottom:2vw;
}

input{
    width:100%;
    font-size:2vw;
    padding:1vw;
    border:2px solid #F25E9D;
    border-radius:12px;
    box-sizing:border-box;
    background:#FCF2C7;
    color:#F25E9D;
    font-family:inherit;
    text-align:center;
}

input::placeholder{
    color:#F25E9D;
    opacity:0.6;
}

button{
    margin-top:2vw;
    width:50%;
    font-size:2vw;
    padding:1vw;
    border:none;
    border-radius:12px;
    cursor:pointer;
    background:#9679B3;
    color:white;
    font-family:inherit;
    transition:0.2s;
}

button:hover{
    filter:brightness(110%);
}

button:active{
    transform:scale(0.98);
}

.footer{
    margin-top:4vw;
    font-size:1.3vw;
    color:#F7E16F;
}

.copy-link{
    color:#6FCAF7;
    cursor:pointer;
    text-decoration:none;
}

.copy-link:hover{
    opacity:0.8;
}

.copy-icon{
    font-family:Arial, sans-serif;
    color:#6FCAF7;
    font-size:1.2em;
}

.settings-link{
    color:#F7E16F;
    text-decoration:none;
}

.settings-link:hover{
    opacity:0.8;
}

</style>

</head>

<body>

<div id="container">

    <h1>BookSearch</h1>

    <input
        id="book"
        type="text"
        placeholder="Title, author, etc."
        autofocus>

    <button onclick="searchBook()">Search</button>

    <div class="footer">
        Add 
        <span class="copy-link" onclick="copyURL()" title="Copy firefox search URL to clipboard">
            https://yoteco.github.io/booksearch?q=%s
            <span class="copy-icon">⧉</span>
        </span>
        to your
        <a class="settings-link" href="about:settings#search" target="_blank">
            firefox search engine
        </a>
    </div>

</div>


<script>

function searchBook(){

    const title = document.getElementById("book").value.trim();

    if(title === "")
        return;

    const q = encodeURIComponent(title);

    // Open Mobilism
    window.open(
        "https://forum.mobilism.me/search.php?keywords=" + q +
        "&sr=topics&sf=titleonly",
        "_blank"
    );

    // Open Anna's Archive
    window.open(
        "https://annas-archive.gl/search?index=&page=1&sort=&ext=epub&display=&q=" + q,
        "_blank"
    );

    // Turn this tab into Goodreads
    window.location.href =
        "https://www.goodreads.com/search?q=" + q;
}


// Enter key search
document.getElementById("book").addEventListener("keydown", function(e){
    if(e.key === "Enter")
        searchBook();
});


// Firefox keyword support
window.onload = function(){

    const params = new URLSearchParams(window.location.search);
    const query = params.get("q");

    if(query){
        document.getElementById("book").value = query;
        searchBook();
    }

};


// Copy Firefox search URL
function copyURL(){

    const url = "https://yoteco.github.io/booksearch/?q=%s";

    navigator.clipboard.writeText(url);

}

</script>

</body>
</html>
