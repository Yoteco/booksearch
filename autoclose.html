<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BookSearch Redirect</title>
</head>

<body>

<script>

const params = new URLSearchParams(window.location.search);
const query = params.get("q");

if(query){

    const q = encodeURIComponent(query);

    // Turn this tab into Goodreads
    window.location.href =
        "https://www.goodreads.com/search?q=" + q;

    // Open Mobilism
    window.open(
        "https://forum.mobilism.me/search.php?keywords=" + q +
        "&sr=topics&sf=titleonly",
        "_blank"
    );

    // Open Anna's Archive
    window.open(
        "https://annas-archive.gl/search?index=&page=1&sort=&ext=epub&display=&q=" + q,
        "_blank"
    );

}

</script>

</body>
</html>
